name: whisper-dictate
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.11

  # PyAudio via conda-forge (handles PortAudio system dependency automatically)
  - pyaudio=0.2.14

  # Everything else via pip
  - pip
  - pip:
      - openai>=1.50.0
      - pynput>=1.7.0
      - python-dotenv>=1.0.0
      # Dev tools
      - pytest>=7.3.0
      - pytest-asyncio>=0.23.0
      - pytest-cov>=4.1.0
      - pytest-timeout>=2.3.0
      - black>=23.0.0
      - pylint>=2.17.0
